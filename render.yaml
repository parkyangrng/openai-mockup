# Render Blueprint
# Push to GitHub → Render → New → Blueprint → connect repo → it deploys.

services:
  - type: web
    name: charter-api-mock
    runtime: python
    region: oregon
    plan: free                    # Upgrade to "starter" ($7/mo) for always-on
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    # $PORT is injected by Render at runtime
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
